name: PowerShell tests

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install test tools
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.6.1 -Scope CurrentUser -Force
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
      - name: Pester
        shell: pwsh
        run: Invoke-Pester -Path tests -CI -Output Detailed
      - name: PSScriptAnalyzer errors
        shell: pwsh
        run: |
          $errors = @()
          foreach ($path in @("install.ps1", "scripts")) {
            $errors += Invoke-ScriptAnalyzer -Path $path -Recurse -Severity Error
          }
          $errors | Format-Table -AutoSize
          if ($errors) { throw "PSScriptAnalyzer found errors." }

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create non-secret validation environment
        run: |
          cp config/defaults.env config/runtime.env
          cat >> config/runtime.env <<'EOF'
          POSTGRES_PASSWORD=test
          REDIS_PASSWORD=test
          KEYCLOAK_ADMIN_PASSWORD=test
          OIDC_CLIENT_SECRET=test
          PAD_SESSION_SECRET=test
          PAD_BOOTSTRAP_PASSWORD=test
          CODER_BOOTSTRAP_PASSWORD=test
          CODER_API_KEY=test
          CODER_TEMPLATE_ID=00000000-0000-0000-0000-000000000000
          CODER_DEFAULT_ORGANIZATION=00000000-0000-0000-0000-000000000000
          EOF
          mkdir -p config/runtime
          cp config/keycloak/realm-template.json config/runtime/keycloak-realm.json
      - name: Validate Compose model
        run: docker compose --env-file config/defaults.env --env-file config/runtime.env config
