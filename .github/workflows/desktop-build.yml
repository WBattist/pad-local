name: Desktop build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: src/frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec electron-builder --win nsis --publish never
      - name: Create checksum
        shell: pwsh
        run: |
          $installer = Get-ChildItem release/Pad-Local-Setup-*-x64.exe | Select-Object -First 1
          $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content "$($installer.FullName).sha256" -NoNewline
      - uses: actions/upload-artifact@v4
        with:
          name: pad-local-windows
          path: |
            src/frontend/release/Pad-Local-Setup-*-x64.exe
            src/frontend/release/Pad-Local-Setup-*-x64.exe.sha256

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pad-local-windows
          path: release
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
