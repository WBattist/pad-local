name: Desktop build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: src/frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm exec electron-builder --win nsis --publish never
      - name: Create checksum
        shell: pwsh
        run: |
          $installer = Get-ChildItem release/Pad-Local-Setup-*-x64.exe | Select-Object -First 1
          $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content "$($installer.FullName).sha256" -NoNewline
      - uses: actions/upload-artifact@v4
        with:
          name: pad-local-windows
          path: |
            src/frontend/release/Pad-Local-Setup-*-x64.exe
            src/frontend/release/Pad-Local-Setup-*-x64.exe.sha256

  linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: src/frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec electron-builder --linux dir --publish never
      - name: Smoke test Linux desktop
        run: |
          set +e
          timeout 15s xvfb-run --auto-servernum release/linux-unpacked/pad-local --no-sandbox
          status=$?
          test "$status" -eq 0 -o "$status" -eq 124
      - run: pnpm exec electron-builder --linux AppImage tar.gz --publish never
      - name: Create checksums
        run: |
          cd release
          for file in Pad-Local-linux.AppImage Pad-Local-linux.tar.gz; do
            sha256sum "$file" > "$file.sha256"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: pad-local-linux
          path: |
            src/frontend/release/Pad-Local-linux.AppImage
            src/frontend/release/Pad-Local-linux.AppImage.sha256
            src/frontend/release/Pad-Local-linux.tar.gz
            src/frontend/release/Pad-Local-linux.tar.gz.sha256

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pad-local-*
          path: release
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
