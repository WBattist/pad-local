name: pad-local

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      CODER_POSTGRES_DB: ${CODER_POSTGRES_DB}
      KEYCLOAK_POSTGRES_DB: ${KEYCLOAK_POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  postgres-init:
    image: postgres:16-alpine
    environment:
      PGHOST: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      CODER_POSTGRES_DB: ${CODER_POSTGRES_DB}
      KEYCLOAK_POSTGRES_DB: ${KEYCLOAK_POSTGRES_DB}
    volumes:
      - ./bootstrap/postgres/init-databases.sh:/opt/pad/init-databases.sh:ro
    entrypoint: ["/bin/sh", "/opt/pad/init-databases.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  keycloak:
    image: ${KEYCLOAK_IMAGE}
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: http://localhost:${KEYCLOAK_PORT}
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    ports:
      - "127.0.0.1:${KEYCLOAK_PORT}:8080"
    volumes:
      - ./config/runtime/keycloak-realm.json:/opt/keycloak/data/import/pad-local-realm.json:ro
      - keycloak_data:/opt/keycloak/data
    depends_on:
      postgres:
        condition: service_healthy
      postgres-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/9000'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      CONTAINERS: 1
      EVENTS: 1
      IMAGES: 1
      INFO: 1
      NETWORKS: 1
      PING: 1
      POST: 1
      SYSTEM: 1
      VERSION: 1
      VOLUMES: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  coder-cli-init:
    image: ${CODER_IMAGE}
    user: "0:0"
    volumes:
      - coder_cli_data:/home/coder/.config/coderv2
    entrypoint: ["sh", "-c", "chown -R 1000:1000 /home/coder/.config/coderv2"]
    restart: "no"

  coder:
    image: ${CODER_IMAGE}
    environment:
      CODER_ACCESS_URL: http://localhost:${CODER_PORT}
      CODER_HTTP_ADDRESS: 0.0.0.0:7080
      CODER_PG_CONNECTION_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${CODER_POSTGRES_DB}?sslmode=disable
      CODER_OIDC_ISSUER_URL: http://host.docker.internal:${KEYCLOAK_PORT}/realms/${OIDC_REALM}
      CODER_OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      CODER_OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      CODER_OIDC_SIGN_IN_TEXT: Sign in to Pad Local
      CODER_OIDC_IGNORE_EMAIL_VERIFIED: "true"
      CODER_OIDC_IGNORE_USERINFO: "true"
      CODER_DANGEROUS_OIDC_SKIP_ISSUER_CHECKS: "true"
      CODER_ADDITIONAL_CSP_POLICY: ${CODER_ADDITIONAL_CSP_POLICY}
      CODER_OAUTH2_GITHUB_DEFAULT_PROVIDER_ENABLED: "false"
      CODER_MAX_ADMIN_TOKEN_LIFETIME: 87600h
      CODER_UPDATE_CHECK: "false"
      DOCKER_HOST: tcp://docker-proxy:2375
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${CODER_PORT}:7080"
    volumes:
      - coder_cli_data:/home/coder/.config/coderv2
      - ./coder-template:/opt/pad/coder-template:ro
    depends_on:
      postgres:
        condition: service_healthy
      postgres-init:
        condition: service_completed_successfully
      coder-cli-init:
        condition: service_completed_successfully
      keycloak:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/7080'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  app:
    build:
      context: .
      target: app
    environment:
      STATIC_DIR: /app/frontend/dist
      ASSETS_DIR: /app/frontend/dist/assets
      FRONTEND_URL: http://localhost:${APP_PORT}
      OIDC_PUBLIC_SERVER_URL: http://localhost:${KEYCLOAK_PORT}
      OIDC_INTERNAL_SERVER_URL: http://keycloak:8080
      OIDC_REALM: ${OIDC_REALM}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      REDIRECT_URI: http://localhost:${APP_PORT}/api/auth/callback
      PAD_COOKIE_SECURE: ${PAD_COOKIE_SECURE}
      PAD_SESSION_SECRET: ${PAD_SESSION_SECRET}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CODER_API_KEY: ${CODER_API_KEY}
      CODER_INTERNAL_URL: http://coder:7080
      CODER_PUBLIC_URL: http://localhost:${CODER_PORT}
      CODER_TEMPLATE_ID: ${CODER_TEMPLATE_ID}
      CODER_DEFAULT_ORGANIZATION: ${CODER_DEFAULT_ORGANIZATION}
      CODER_WORKSPACE_NAME: ${CODER_WORKSPACE_NAME}
      API_WORKERS: ${API_WORKERS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      coder:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8000/api/app/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "127.0.0.1:${APP_PORT}:8000"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  keycloak_data:
  coder_cli_data:
